<app-breadcrumb title="Gallery"></app-breadcrumb>

<section class="po-gallery-section pt-100 pb-70">
  <div class="container">
    <div class="po-section-title text-center mb-60">
      <div class="iner-sub-heading"><h4 class="sec-subtitle iner-subtitle">Gallery</h4></div>
      <h2 class="sec-title text-40 font-bold leading-40 pt-16 pb-16">Campaign Moments &amp; Highlights</h2>
    </div>
    <!-- Filter buttons -->
    <div class="filter-button-group text-center mb-40">
      <button class="active" data-filter="*">All</button>
      <button data-filter=".events">Events</button>
      <button data-filter=".team">Team</button>
      <button data-filter=".community">Community</button>
    </div>
    <!-- Gallery grid -->
    <div class="gallery-grid row">
      <div class="grid-item events col-xl-4 col-md-6 mb-30">
        <div class="po-gallery-item"><img class="w-100 rounded-7" src="assets/img/gallery/po-gallery-1.1.png" alt=""></div>
      </div>
      <div class="grid-item team col-xl-4 col-md-6 mb-30">
        <div class="po-gallery-item"><img class="w-100 rounded-7" src="assets/img/gallery/po-gallery-1.2.png" alt=""></div>
      </div>
      <div class="grid-item community col-xl-4 col-md-6 mb-30">
        <div class="po-gallery-item"><img class="w-100 rounded-7" src="assets/img/gallery/po-gallery-1.3.png" alt=""></div>
      </div>
      <div class="grid-item events col-xl-4 col-md-6 mb-30">
        <div class="po-gallery-item"><img class="w-100 rounded-7" src="assets/img/gallery/po-gallery-1.4.png" alt=""></div>
      </div>
      <div class="grid-item team col-xl-4 col-md-6 mb-30">
        <div class="po-gallery-item"><img class="w-100 rounded-7" src="assets/img/gallery/po-gallery-1.5.png" alt=""></div>
      </div>
      <div class="grid-item community col-xl-4 col-md-6 mb-30">
        <div class="po-gallery-item"><img class="w-100 rounded-7" src="assets/img/gallery/po-gallery-1.6.png" alt=""></div>
      </div>
    </div>
  </div>
</section>
