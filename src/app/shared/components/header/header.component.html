<!-- Desktop header -->
<header>
  <div class="po-header-area d-none d-lg-block stiky">
    <div class="container po-header-bg">
      <div class="row align-items-center">
        <div class="col-lg-2 col-md-6 col-6">
          <div class="po-logo">
            <a routerLink="/"><img src="assets/img/logo/po-logo1.1.png" alt="Damaso"></a>
          </div>
        </div>
        <div class="col-lg-8 d-none d-lg-block">
          <div class="po-main-menu text-center">
            <ul>
              <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a></li>
              <li><a routerLink="/about" routerLinkActive="active">Candidato</a></li>
              <li><a routerLink="/service" routerLinkActive="active">Plan de Gobierno</a></li>
              <li><a routerLink="/events" routerLinkActive="active">Tu Zona</a></li>
              <li><a routerLink="/contact" routerLinkActive="active">Ser Voluntario</a></li>
            </ul>
          </div>
        </div>
        <div class="col-lg-2 col-md-6 col-6">
          <div class="po-header-btn text-end">
            <a href="https://wa.me/59170000000" target="_blank" rel="noopener" class="po-btn-sec po-btn-sec-1" style="background-color:#25D366 !important;border-color:#25D366 !important;">
              <span class="po-btn-wrap">
                <span class="po-btn-y-1"><i class="fa-brands fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</span>
                <span class="po-btn-y-2"><i class="fa-brands fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Mobile header -->
<div class="mobile-header mobile-header-main d-block d-lg-none">
  <div class="container-fluid">
    <div class="col-12">
      <div class="mobile-header-elements">
        <div class="mobile-logo">
          <a routerLink="/"><img src="assets/img/logo/po-logo1.2.png" alt="Damaso"></a>
        </div>
        <div class="mobile-nav-icon">
          <i class="fa-duotone fa-bars-staggered"></i>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="mobile-sidebar d-block d-lg-none">
  <div class="logo-m">
    <a routerLink="/"><img src="assets/img/logo/po-logo1.2.png" alt="Damaso"></a>
  </div>
  <div class="menu-close">
    <i class="fa-solid fa-xmark"></i>
  </div>
  <div class="mobile-nav">
    <ul>
      <li><a routerLink="/">Inicio</a></li>
      <li><a routerLink="/about">Candidato</a></li>
      <li><a routerLink="/service">Plan de Gobierno</a></li>

    <div class="mobile-button">
      <a href="https://wa.me/59170000000" target="_blank" rel="noopener" class="po-btn-sec po-btn-sec-1" style="background-color:#25D366 !important;border-color:#25D366 !important;">
        <span class="po-btn-wrap">
          <span class="po-btn-y-1"><i class="fa-brands fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</span>
          <span class="po-btn-y-2"><i class="fa-brands fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</span>

      </div>
      <div class="contact-box">
        <div class="mob-icon"><span><img src="assets/img/icon/po-mail-1.2.svg" alt=""></span></div>

      <div class="contact-box">
