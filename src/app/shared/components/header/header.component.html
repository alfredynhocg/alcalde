<!-- Desktop header -->
<header>
  <div class="po-header-area d-none d-lg-block stiky">
    <div class="container po-header-bg">
      <div class="row align-items-center">
        <div class="col-lg-2 col-md-6 col-6">
          <div class="po-logo">
            <a routerLink="/"><img src="assets/img/logo/po-logo1.1.png" alt="Damaso"></a>
          </div>
        </div>
        <div class="col-lg-7 d-none d-lg-block">
          <div class="po-main-menu text-center">
            <ul>
              <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a></li>
              <li><a routerLink="/about" routerLinkActive="active">Candidato</a></li>
              <li><a routerLink="/service" routerLinkActive="active">Plan de Gobierno</a></li>

        </div>
        <div class="col-lg-3 col-md-6 col-6">
          <div class="po-header-btn text-end d-flex align-items-center justify-content-end gap-2">
            <a href="https://wa.me/59179113146" target="_blank" rel="noopener" class="po-btn-sec po-btn-sec-1" style="background-color:#25D366 !important;border-color:#25D366 !important;">
              <span class="po-btn-wrap">
                <span class="po-btn-y-1"><i class="fa-brands fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</span>
                <span class="po-btn-y-2"><i class="fa-brands fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</span>
              </span>
            </a>
            <a href="https://www.facebook.com/damaso.ninajahuanca" target="_blank" rel="noopener" class="header-social-icon" style="background:#1877F2;" title="Facebook">
              <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://www.tiktok.com/@damaso_ninaja?_r=1&_t=ZS-94Xpb3NOjDc" target="_blank" rel="noopener" class="header-social-icon" style="background:#000000;" title="TikTok">
              <i class="fa-brands fa-tiktok"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
